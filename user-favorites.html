<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giver — Favorites</title>
<meta name="description" content="Your saved favorite gifts on Giver.">
<link rel="icon" href="surprise(1).png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0ece4; --card-bg: #faf8f4; --border: #e2ddd5;
    --text-primary: #1c1a17; --text-secondary: #7a7268;
    --accent: #b8965a; --accent-light: #e8dcc8; --accent-hover: #9a7a44;
    --btn-bg: #ede8df; --btn-hover: #e0d9cd;
    --shadow: 0 1px 3px rgba(28,26,23,0.06), 0 4px 16px rgba(28,26,23,0.04);
    --shadow-hover: 0 4px 12px rgba(28,26,23,0.1), 0 16px 40px rgba(28,26,23,0.08);
    --danger: #c0392b; --danger-bg: #fdf0ee;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; font-size: 15px; }
  nav { display: flex; align-items: center; justify-content: space-between; padding: 0 48px; height: 64px; background: var(--bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; backdrop-filter: blur(8px); }
  .logo { display: flex; align-items: center; gap: 10px; font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: var(--text-primary); text-decoration: none; }
  .nav-links { display: flex; align-items: center; gap: 4px; list-style: none; }
  .nav-links a { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px; font-size: 14px; color: var(--text-secondary); text-decoration: none; transition: all 0.18s ease; }
  .nav-links a:hover { color: var(--text-primary); background: var(--accent-light); }
  .nav-links a.active { color: var(--accent); font-weight: 500; }
  .nav-links li:last-child a:hover { color: var(--danger); background: var(--danger-bg); }
  main { max-width: 1100px; margin: 0 auto; padding: 56px 48px 80px; }
  .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 36px; animation: fadeUp 0.4s ease both; }
  .page-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 500; }
  .page-header p { color: var(--text-secondary); margin-top: 4px; font-size: 14px; font-weight: 300; }
  .gifts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; animation: fadeUp 0.4s ease 0.1s both; }
  .gift-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); transition: box-shadow 0.2s ease, transform 0.2s ease, border-color 0.2s ease; }
  .gift-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-3px); border-color: var(--accent-light); }
  .gift-img-wrap { position: relative; width: 100%; aspect-ratio: 1/1; overflow: hidden; background: #ede8df; }
  .gift-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s ease; }
  .gift-card:hover .gift-img-wrap img { transform: scale(1.04); }
  .fav-btn { position: absolute; top: 10px; right: 10px; width: 34px; height: 34px; background: #fff; border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.12); transition: all 0.18s ease; }
  .fav-btn:hover { transform: scale(1.1); }
  .gift-category-badge { position: absolute; top: 10px; left: 10px; padding: 3px 10px; background: rgba(255,255,255,0.92); border-radius: 20px; font-size: 11px; font-weight: 500; color: var(--accent-hover); backdrop-filter: blur(4px); }
  .gift-info { padding: 14px 16px 16px; }
  .gift-name { font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 10px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .gift-bottom { display: flex; align-items: center; gap: 10px; }
  .gift-price { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 500; color: var(--text-primary); white-space: nowrap; }
  .gift-rating { display: flex; align-items: center; gap: 3px; font-size: 13px; color: var(--text-secondary); flex: 1; }
  .view-btn { padding: 7px 14px; background: var(--btn-bg); border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text-primary); cursor: pointer; transition: all 0.15s ease; white-space: nowrap; text-decoration: none; }
  .view-btn:hover { background: var(--btn-hover); border-color: var(--accent-light); color: var(--accent); }
  .empty-state { text-align: center; padding: 80px 32px; color: var(--text-secondary); }
  .empty-state h3 { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; color: var(--text-primary); margin: 16px 0 8px; }
  .empty-state p { font-size: 14px; font-weight: 300; margin-bottom: 24px; }
  .browse-btn { display: inline-flex; align-items: center; gap: 7px; padding: 12px 22px; background: var(--accent); border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: #fff; cursor: pointer; text-decoration: none; transition: all 0.18s ease; }
  .browse-btn:hover { background: var(--accent-hover); }
  .toast { position: fixed; bottom: 32px; right: 32px; z-index: 400; background: var(--text-primary); color: #fff; padding: 13px 20px; border-radius: 10px; font-size: 14px; display: flex; align-items: center; gap: 9px; box-shadow: 0 8px 24px rgba(28,26,23,0.2); transform: translateY(16px); opacity: 0; transition: all 0.25s ease; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 768px) { nav { padding: 0 20px; } main { padding: 40px 20px 60px; } .gifts-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
<nav>
  <a class="logo" href="user-home.html">
    <img src="surprise(1).png" style="width:32px;height:32px;object-fit:contain;" alt="Giver"> Giver
  </a>
  <ul class="nav-links">
    <li><a href="user-home.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg> Home</a></li>
    <li><a href="user-recipients.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg> Recipients</a></li>
    <li><a href="user-favorites.html" class="active"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> Favorites</a></li>
    <li><a href="#" onclick="logout()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Logout</a></li>
  </ul>
</nav>
<main>
  <div class="page-header">
    <div>
      <h1>Favorites</h1>
      <p>Your saved gift ideas</p>
    </div>
  </div>
  <div class="gifts-grid" id="giftsGrid"></div>
</main>
<div class="toast" id="toast">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toastMsg"></span>
</div>
<script>
  const user = JSON.parse(sessionStorage.getItem('giver_user') || '{}');
  if (!user || !user.username) window.location.href = 'login_register_page.html';
  if (user.role === 'admin') window.location.href = 'giver-dashboard.html';

  const FAV_KEY = 'giver_favorites_' + (user.username || 'guest');
  let favorites = JSON.parse(localStorage.getItem(FAV_KEY) || '[]');

  const ALL_GIFTS = [
    { id: 1,  name: 'Lenovo ERAZER XF36 Wireless Earbuds',        price: 259,  rating: 4.9, category: 'electronics', img: 'https://down-th.img.susercontent.com/file/th-11134207-7r98v-lp8lsxyghpn7bf' },
    { id: 2,  name: 'Congrats Gift Box Set with Candle',           price: 35,   rating: 4.8, category: 'home-decor',  img: 'https://down-th.img.susercontent.com/file/th-11134207-7r991-lrwkr4vqq08mb3' },
    { id: 3,  name: 'Glad2Glow Lip Serum 3-in-1',                 price: 125,  rating: 4.9, category: 'beauty',       img: 'https://down-th.img.susercontent.com/file/th-11134207-7r991-ls2lmq7l23h96e' },
    { id: 4,  name: 'Yoga Mat Non-Slip with Carry Strap',         price: 349,  rating: 4.7, category: 'fitness',      img: 'https://down-th.img.susercontent.com/file/th-11134207-7r98v-lx6r2s5m6nl040' },
    { id: 5,  name: 'Aromatherapy Diffuser & Essential Oil Set',   price: 490,  rating: 4.8, category: 'home-decor',  img: 'https://down-th.img.susercontent.com/file/th-11134207-7r98x-lzge93xvzl9k1d' },
    { id: 6,  name: 'Mechanical Keyboard RGB Gaming',              price: 899,  rating: 4.6, category: 'electronics', img: 'https://down-th.img.susercontent.com/file/th-11134207-7qukw-lhivt3rrfpxkbb' },
    { id: 7,  name: 'Plant Pot Set Minimalist Ceramic',            price: 199,  rating: 4.7, category: 'home-decor',  img: 'https://down-th.img.susercontent.com/file/th-11134207-7r98x-lylxol4efpvo75' },
    { id: 8,  name: 'Resistance Bands Set (5 levels)',             price: 149,  rating: 4.8, category: 'fitness',     img: 'https://down-th.img.susercontent.com/file/th-11134207-7r98w-lqwobzjv5d5cdd' },
    { id: 9,  name: 'Smart Watch Fitness Tracker',                 price: 799,  rating: 4.5, category: 'electronics', img: 'https://down-th.img.susercontent.com/file/th-11134207-7r990-lxq0n1kqz2je5e' },
    { id: 10, name: 'Scented Soy Wax Candle Gift Set',             price: 280,  rating: 4.9, category: 'home-decor',  img: 'https://down-th.img.susercontent.com/file/th-11134207-7r98x-lwas0aevmq3j8e' },
    { id: 11, name: 'Protein Shaker Bottle 700ml',                 price: 89,   rating: 4.6, category: 'fitness',     img: 'https://down-th.img.susercontent.com/file/th-11134207-7r98y-lzf4fxo6l2np70' },
    { id: 12, name: 'Korean Skincare Set (Toner + Moisturizer)',   price: 320,  rating: 4.8, category: 'beauty',      img: 'https://down-th.img.susercontent.com/file/th-11134207-7r98x-lz4nfx6hkc9j31' },
  ];

  function isFav(id) { return favorites.includes(id); }

  function removeFav(id) {
    favorites = favorites.filter(f => f !== id);
    localStorage.setItem(FAV_KEY, JSON.stringify(favorites));
    showToast('Removed from favorites.');
    renderGrid();
  }

  function renderGrid() {
    const grid = document.getElementById('giftsGrid');
    const favGifts = ALL_GIFTS.filter(g => favorites.includes(g.id));

    if (favGifts.length === 0) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1;">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" opacity=".35">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
          <h3>No favorites yet</h3>
          <p>Browse gifts and tap the ♥ to save your favorites here.</p>
          <a href="user-gifts.html" class="browse-btn">Browse Gifts</a>
        </div>`;
      return;
    }

    grid.innerHTML = favGifts.map(g => `
      <div class="gift-card">
        <div class="gift-img-wrap">
          <img src="${g.img}" alt="${escHtml(g.name)}"
               onerror="this.src='surprise(1).png';this.style.objectFit='contain';this.style.padding='24px';">
          <span class="gift-category-badge">${escHtml(g.category)}</span>
          <button class="fav-btn" onclick="removeFav(${g.id})" title="Remove from favorites">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="#e74c3c" stroke="#e74c3c" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
          </button>
        </div>
        <div class="gift-info">
          <div class="gift-name">${escHtml(g.name)}</div>
          <div class="gift-bottom">
            <span class="gift-price">฿${g.price.toLocaleString()}</span>
            <span class="gift-rating">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="var(--accent)" stroke="var(--accent)" stroke-width="1">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
              </svg>
              ${g.rating}
            </span>
            <a href="user-gifts.html?id=${g.id}" class="view-btn">View details</a>
          </div>
        </div>
      </div>
    `).join('');
  }

  let toastTimer;
  function showToast(msg) {
    const toast = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    toast.className = 'toast show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
  }

  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function logout() { sessionStorage.removeItem('giver_user'); window.location.href = 'login_register_page.html'; }

  renderGrid();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giver — Recommendations</title>
  <meta name="description" content="Personalized gift recommendations based on recipient interests.">
  <link rel="icon" href="surprise(1).png" type="image/png">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #f0ece4;
      --card-bg: #faf8f4;
      --border: #e2ddd5;
      --text-primary: #1c1a17;
      --text-secondary: #7a7268;
      --accent: #b8965a;
      --accent-light: #e8dcc8;
      --accent-hover: #9a7a44;
      --btn-bg: #ede8df;
      --btn-hover: #e0d9cd;
      --shadow: 0 1px 3px rgba(28, 26, 23, 0.06), 0 4px 16px rgba(28, 26, 23, 0.04);
      --shadow-hover: 0 4px 12px rgba(28, 26, 23, 0.1), 0 16px 40px rgba(28, 26, 23, 0.08);
      --danger: #c0392b;
      --danger-bg: #fdf0ee;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.5;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 64px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 200;
      backdrop-filter: blur(8px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
      list-style: none;
    }

    .nav-links a {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 400;
      color: var(--text-secondary);
      text-decoration: none;
      transition: all 0.18s ease;
    }

    .nav-links a:hover {
      color: var(--text-primary);
      background: var(--accent-light);
    }

    .nav-links a.active {
      color: var(--accent);
      font-weight: 500;
    }

    .nav-links li:last-child a:hover {
      color: var(--danger);
      background: var(--danger-bg);
    }

    /* ── MAIN ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 48px 80px;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      margin-bottom: 24px;
      animation: fadeUp 0.4s ease both;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      margin-bottom: 16px;
      transition: color 0.15s;
    }

    .back-link:hover {
      color: var(--accent);
    }

    .page-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 500;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }

    .page-header p {
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 300;
      margin-top: 2px;
    }

    .recipient-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .rec-tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      background: var(--accent);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      color: #fff;
    }

    /* ── INTERESTS CARD ── */
    .interests-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 32px;
      box-shadow: var(--shadow);
      animation: fadeUp 0.4s ease 0.05s both;
    }

    .interests-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    .interests-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .interest-chip {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      background: var(--btn-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      color: var(--text-primary);
    }

    /* ── SECTION TITLE ── */
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 20px;
      animation: fadeUp 0.4s ease 0.1s both;
    }

    /* ── GIFT GRID ── */
    .gifts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      animation: fadeUp 0.4s ease 0.15s both;
    }

    /* ── GIFT CARD ── */
    .gift-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
    }

    .gift-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-3px);
      border-color: var(--accent-light);
    }

    .gift-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: #ede8df;
    }

    .gift-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .gift-card:hover .gift-img-wrap img {
      transform: scale(1.04);
    }

    /* Favorite button */
    .fav-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 34px;
      height: 34px;
      background: #fff;
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
      transition: all 0.18s ease;
    }

    .fav-btn:hover {
      transform: scale(1.1);
    }

    .fav-btn svg {
      transition: all 0.18s ease;
    }

    .fav-btn.active svg {
      fill: #e74c3c;
      stroke: #e74c3c;
    }

    /* Category badge */
    .gift-category-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 3px 10px;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      color: var(--accent-hover);
      backdrop-filter: blur(4px);
    }

    /* Gift info */
    .gift-info {
      padding: 14px 16px 16px;
    }

    .gift-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 10px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .gift-bottom {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .gift-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
    }

    .gift-rating {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 13px;
      color: var(--text-secondary);
      flex: 1;
    }

    .gift-rating svg {
      color: var(--accent);
    }

    .view-btn {
      padding: 7px 14px;
      background: var(--btn-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
      text-decoration: none;
    }

    .view-btn:hover {
      background: var(--btn-hover);
      border-color: var(--accent-light);
      color: var(--accent);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 64px 32px;
      color: var(--text-secondary);
    }

    .empty-state h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 500;
      color: var(--text-primary);
      margin: 16px 0 8px;
    }

    .empty-state p {
      font-size: 14px;
      font-weight: 300;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      z-index: 400;
      background: var(--text-primary);
      color: #fff;
      padding: 13px 20px;
      border-radius: 10px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 9px;
      box-shadow: 0 8px 24px rgba(28, 26, 23, 0.2);
      transform: translateY(16px);
      opacity: 0;
      transition: all 0.25s ease;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      nav {
        padding: 0 20px;
      }

      main {
        padding: 32px 20px 60px;
      }

      .gifts-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }
    }

    @media (max-width: 480px) {
      .gifts-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <nav>
    <a class="logo" href="user-home.html">
      <img src="surprise(1).png" style="width:32px;height:32px;object-fit:contain;" alt="Giver">
      Giver
    </a>
    <ul class="nav-links">
      <li><a href="user-home.html">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z" />
            <path d="M9 21V12h6v9" />
          </svg>
          Home
        </a></li>
      <li><a href="user-recipients.html">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
          Recipients
        </a></li>
      <li><a href="user-favorites.html">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <polygon
              points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
          </svg>
          Favorites
        </a></li>
      <li><a href="#" onclick="logout()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Logout
        </a></li>
    </ul>
  </nav>

  <main>
    <!-- HEADER -->
    <div class="page-header">
      <a class="back-link" href="user-recipients.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 5l-7 7 7 7" />
        </svg>
        Back to Recipients
      </a>
      <h1>Recipient Management</h1>
      <p id="pageSubtitle">Personalized gifts</p>
      <div class="recipient-tags" id="recipientTags"></div>
    </div>

    <!-- INTERESTS CARD -->
    <div class="interests-card">
      <div class="interests-label">Interests</div>
      <div class="interests-tags" id="interestsTags">
        <span class="interest-chip" style="color:var(--text-secondary);font-style:italic;">No interests specified</span>
      </div>
    </div>

    <!-- GIFTS SECTION -->
    <div class="section-title" id="sectionTitle">Recommended Gifts</div>
    <div class="gifts-grid" id="giftsGrid"></div>
  </main>

  <!-- TOAST -->
  <div class="toast" id="toast">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="20 6 9 17 4 12" />
    </svg>
    <span id="toastMsg"></span>
  </div>

  <script>
    /* ─── AUTH ─── */
    const user = JSON.parse(sessionStorage.getItem('giver_user') || '{}');
    if (!user || !user.id) window.location.href = 'login_register_page.html';
    if (user.role === 'admin') window.location.href = 'giver-dashboard.html';

    const userId = user.id;
    let ALL_GIFTS = [];
    let VOCABULARY = [];
    let RULES = [];
    let favorites = [];

    /* ─── LOAD ALL DATA FROM API ─── */
    async function loadData() {
      try {
        const [giftsRes, vocabRes, rulesRes, favsRes] = await Promise.all([
          fetch('/api/gifts'),
          fetch('/api/vocabulary'),
          fetch('/api/rules'),
          fetch(`/api/favorites?userId=${userId}`)
        ]);
        ALL_GIFTS = giftsRes.ok ? await giftsRes.json() : [];
        VOCABULARY = vocabRes.ok ? await vocabRes.json() : [];
        RULES = rulesRes.ok ? await rulesRes.json() : [];
        favorites = favsRes.ok ? await favsRes.json() : [];
      } catch (e) { console.error('Data load error', e); }
    }

    /* ─── FAVORITES ─── */
    function isFav(giftId) { return favorites.includes(String(giftId)); }

    async function toggleFav(giftId, btn) {
      try {
        const res = await fetch('/api/favorites/toggle', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, giftId: String(giftId) })
        });
        if (!res.ok) return;
        const data = await res.json();
        favorites = data.giftIds;
        const active = favorites.includes(String(giftId));
        btn.classList.toggle('active', active);
        const svg = btn.querySelector('svg');
        svg.setAttribute('fill', active ? '#e74c3c' : 'none');
        svg.setAttribute('stroke', active ? '#e74c3c' : '#7a7268');
        showToast(active ? 'Added to favorites! ♥' : 'Removed from favorites.');
      } catch (e) { showToast('Error updating favorites.'); }
    }

    /* ─── RECOMMENDATION ENGINE ─── */
    function expandInterests(interests) {
      const expanded = new Set();
      interests.forEach(raw => {
        const lower = raw.toLowerCase().trim();
        expanded.add(lower);
        VOCABULARY.forEach(v => {
          const synonyms = v.synonyms || [];
          if (v.term === lower || synonyms.includes(lower)) {
            expanded.add(v.term);
            synonyms.forEach(s => expanded.add(s));
          }
        });
      });
      return [...expanded];
    }

    function getMatchedCategories(expandedInterests) {
      const categories = new Set();
      RULES.forEach(rule => {
        const conditions = rule.condition || [];
        const matched = conditions.some(c => expandedInterests.includes(c.toLowerCase()));
        if (matched) {
          (rule.target_category_ids || rule.categories || []).forEach(cat => categories.add(cat));
        }
      });
      return [...categories];
    }

    function scoreGift(gift, expandedInterests) {
      const tags = gift.tags || gift.keywords || [];
      return tags.filter(k => expandedInterests.includes(k.toLowerCase())).length;
    }

    function getGiftCategory(gift) {
      return gift.category_id || gift.category || '';
    }

    function getFirstImg(g) {
      if (g.options && g.options.length > 0) return g.options[0].image_url || 'surprise(1).png';
      return g.image || 'surprise(1).png';
    }
    function getFirstPrice(g) {
      if (g.options && g.options.length > 0) return g.options[0].price || 0;
      return g.price || 0;
    }

    function getRecommendedGifts(recipient) {
      if (!recipient.interests || recipient.interests.length === 0) {
        return [...ALL_GIFTS].sort((a, b) => (b.rating || 0) - (a.rating || 0));
      }
      const expanded = expandInterests(recipient.interests);
      const categories = getMatchedCategories(expanded);
      const scored = ALL_GIFTS.map(g => ({
        ...g,
        _score: scoreGift(g, expanded) + (categories.includes(getGiftCategory(g)) ? 5 : 0)
      }));
      return scored
        .filter(g => g._score > 0 || categories.includes(getGiftCategory(g)))
        .sort((a, b) => b._score - a._score || (b.rating || 0) - (a.rating || 0));
    }

    /* ─── RENDER PAGE ─── */
    function renderPage(recipient) {
      document.getElementById('pageSubtitle').textContent = `Personalized gifts for ${recipient.name}`;
      document.title = `Giver — Gifts for ${recipient.name}`;

      const tagsEl = document.getElementById('recipientTags');
      tagsEl.innerHTML = [
        `<span class="rec-tag">Age: ${recipient.age}</span>`,
        `<span class="rec-tag">${escHtml(recipient.relation)}</span>`,
        recipient.gender ? `<span class="rec-tag">${escHtml(recipient.gender)}</span>` : ''
      ].join('');

      const interestsEl = document.getElementById('interestsTags');
      if (recipient.interests && recipient.interests.length > 0) {
        interestsEl.innerHTML = recipient.interests
          .map(i => `<span class="interest-chip">${escHtml(i.trim())}</span>`)
          .join('');
      } else {
        interestsEl.innerHTML = `<span class="interest-chip" style="color:var(--text-secondary);font-style:italic;">No interests specified</span>`;
      }

      const recommended = getRecommendedGifts(recipient);
      const grid = document.getElementById('giftsGrid');
      const titleEl = document.getElementById('sectionTitle');

      titleEl.textContent = recommended.length > 0
        ? `Recommended Gifts (${recommended.length})` : 'No Recommendations';

      if (recommended.length === 0) {
        grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1;">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" opacity=".35">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
          <h3>No matches found</h3>
          <p>Try updating the recipient's interests to get better recommendations.</p>
        </div>`;
        return;
      }

      grid.innerHTML = recommended.map(g => {
        const id = g._id || g.id;
        const name = g.gift_name || g.name || '';
        const cat = getGiftCategory(g);
        const imgSrc = getFirstImg(g);
        const price = getFirstPrice(g);
        const fav = isFav(id);
        return `
      <div class="gift-card">
        <div class="gift-img-wrap">
          <img src="${imgSrc}" alt="${escHtml(name)}"
               onerror="this.src='surprise(1).png';this.style.objectFit='contain';this.style.padding='24px';">
          <span class="gift-category-badge">${escHtml(cat)}</span>
          <button class="fav-btn ${fav ? 'active' : ''}" id="fav-${id}"
                  onclick="toggleFav('${id}', this)"
                  title="${fav ? 'Remove from favorites' : 'Add to favorites'}">
            <svg width="16" height="16" viewBox="0 0 24 24"
                 fill="${fav ? '#e74c3c' : 'none'}"
                 stroke="${fav ? '#e74c3c' : '#7a7268'}" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
          </button>
        </div>
        <div class="gift-info">
          <div class="gift-name">${escHtml(name)}</div>
          <div class="gift-bottom">
            <span class="gift-price">฿${Number(price).toLocaleString()}</span>
            <span class="gift-rating">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="var(--accent)" stroke="var(--accent)" stroke-width="1">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
              </svg>
              ${g.rating || '—'}
            </span>
            <a href="user-gifts.html" class="view-btn">View details</a>
          </div>
        </div>
      </div>`;
      }).join('');
    }

    /* ─── TOAST ─── */
    let toastTimer;
    function showToast(msg) {
      const toast = document.getElementById('toast');
      document.getElementById('toastMsg').textContent = msg;
      toast.className = 'toast show';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function escHtml(str) {
      return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function logout() { sessionStorage.removeItem('giver_user'); window.location.href = 'login_register_page.html'; }

    /* ─── INIT ─── */
    async function init() {
      await loadData();
      // Try sessionStorage first, then fetch by URL id
      const recipientData = JSON.parse(sessionStorage.getItem('giver_selected_recipient') || 'null');
      if (recipientData) {
        renderPage(recipientData);
        return;
      }
      const urlId = new URLSearchParams(window.location.search).get('id');
      if (urlId) {
        try {
          const res = await fetch(`/api/recipients?userId=${userId}`);
          const recs = res.ok ? await res.json() : [];
          const found = recs.find(r => r._id === urlId);
          if (found) { renderPage(found); return; }
        } catch (e) { }
      }
      window.location.href = 'user-recipients.html';
    }

    init();
  </script>
</body>
</html>

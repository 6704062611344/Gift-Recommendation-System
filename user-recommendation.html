<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giver — Recommendations</title>
  <meta name="description" content="Personalized gift recommendations based on recipient interests.">
  <link rel="icon" href="icon\\surprise (1).png" type="image/png">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #f0ece4;
      --card-bg: #faf8f4;
      --border: #e2ddd5;
      --text-primary: #1c1a17;
      --text-secondary: #7a7268;
      --accent: #b8965a;
      --accent-light: #e8dcc8;
      --accent-hover: #9a7a44;
      --btn-bg: #ede8df;
      --btn-hover: #e0d9cd;
      --shadow: 0 1px 3px rgba(28, 26, 23, 0.06), 0 4px 16px rgba(28, 26, 23, 0.04);
      --shadow-hover: 0 4px 12px rgba(28, 26, 23, 0.1), 0 16px 40px rgba(28, 26, 23, 0.08);
      --danger: #c0392b;
      --danger-bg: #fdf0ee;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.5;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 64px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 200;
      backdrop-filter: blur(8px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
      list-style: none;
    }

    .nav-links a {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 400;
      color: var(--text-secondary);
      text-decoration: none;
      transition: all 0.18s ease;
    }

    .nav-links a:hover {
      color: var(--text-primary);
      background: var(--accent-light);
    }

    .nav-links a.active {
      color: var(--accent);
      font-weight: 500;
    }

    .nav-links li:last-child a:hover {
      color: var(--danger);
      background: var(--danger-bg);
    }

    /* ── MAIN ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 48px 80px;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      margin-bottom: 24px;
      animation: fadeUp 0.4s ease both;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      margin-bottom: 16px;
      transition: color 0.15s;
    }

    .back-link:hover {
      color: var(--accent);
    }

    .page-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 500;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }

    .page-header p {
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 300;
      margin-top: 2px;
    }

    .recipient-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .rec-tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      background: var(--accent);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      color: #fff;
    }

    /* ── INTERESTS CARD ── */
    .interests-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 32px;
      box-shadow: var(--shadow);
      animation: fadeUp 0.4s ease 0.05s both;
    }

    .interests-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    .interests-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .interest-chip {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      background: var(--btn-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      color: var(--text-primary);
    }

    /* ── SECTION TITLE ── */
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 20px;
      animation: fadeUp 0.4s ease 0.1s both;
    }

    /* ── GIFT GRID ── */
    .gifts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      animation: fadeUp 0.4s ease 0.15s both;
    }

    /* ── GIFT CARD ── */
    .gift-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
    }

    .gift-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-3px);
      border-color: var(--accent-light);
    }

    .gift-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: #ede8df;
    }

    .gift-slide-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.35s ease, transform 0.3s ease;
    }
    .gift-card:hover .gift-slide-img { transform: scale(1.04); }

    /* Slideshow dots */
    .img-dots {
      position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 4px;
    }
    .img-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(255,255,255,0.55); transition: background 0.3s;
    }
    .img-dot.active { background: #fff; }

    /* Favorite button */
    .fav-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 34px;
      height: 34px;
      background: #fff;
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
      transition: all 0.18s ease;
    }
    .fav-btn:hover { transform: scale(1.1); }
    .fav-btn.active svg { fill: #e74c3c; stroke: #e74c3c; }

    /* Category badge */
    .gift-category-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 3px 10px;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      color: var(--accent-hover);
      backdrop-filter: blur(4px);
    }

    /* Gift info */
    .gift-info { padding: 14px 16px 16px; }

    .gift-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 12px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .view-btn {
      width: 100%;
      padding: 9px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s;
      letter-spacing: 0.02em;
    }
    .view-btn:hover { background: var(--accent-hover); }

    /* ── DETAIL MODAL ── */
    .detail-overlay {
      position: fixed; inset: 0; background: rgba(28,26,23,0.45);
      display: none; align-items: center; justify-content: center;
      z-index: 300; backdrop-filter: blur(4px); padding: 20px;
    }
    .detail-overlay.open { display: flex; }
    .detail-modal {
      background: var(--card-bg); border-radius: 20px; width: 100%;
      max-width: 620px; max-height: 85vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(28,26,23,0.22);
      animation: fadeUp 0.25s ease both;
    }
    .detail-head {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 24px 24px 16px; border-bottom: 1px solid var(--border);
    }
    .detail-head h2 { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 500; }
    .detail-head p { color: var(--text-secondary); font-size: 13px; margin-top: 4px; line-height: 1.5; }
    .detail-close {
      width: 32px; height: 32px; border: none; background: var(--btn-bg);
      border-radius: 50%; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: background 0.15s;
    }
    .detail-close:hover { background: var(--btn-hover); }
    .detail-options { display: flex; flex-direction: column; gap: 14px; padding: 20px 24px 24px; }
    .detail-opts-label {
      font-size: 12px; font-weight: 500; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--text-secondary); margin-bottom: 2px;
    }
    .detail-opt-card {
      display: flex; background: var(--bg); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden; align-items: stretch;
    }
    .detail-opt-img { width: 120px; height: 120px; object-fit: cover; flex-shrink: 0; }
    .detail-opt-info {
      flex: 1; padding: 14px 16px;
      display: flex; flex-direction: column; justify-content: space-between;
    }
    .detail-opt-shop { font-size: 14px; font-weight: 500; color: var(--text-primary); }
    .detail-opt-price {
      font-family: 'Cormorant Garamond', serif; font-size: 22px;
      font-weight: 500; color: var(--text-primary); margin-top: 2px;
    }
    .detail-opt-rating { font-size: 12px; color: var(--accent); margin-top: 2px; }
    .detail-opt-link {
      display: inline-flex; align-items: center; gap: 5px; margin-top: 10px;
      padding: 7px 14px; background: var(--accent); color: #fff;
      border-radius: 8px; font-size: 13px; text-decoration: none;
      transition: background 0.15s; align-self: flex-start;
    }
    .detail-opt-link:hover { background: var(--accent-hover); }
    .detail-no-link { margin-top: 10px; font-size: 12px; color: var(--text-secondary); font-style: italic; }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 64px 32px;
      color: var(--text-secondary);
    }

    .empty-state h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 500;
      color: var(--text-primary);
      margin: 16px 0 8px;
    }

    .empty-state p {
      font-size: 14px;
      font-weight: 300;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      z-index: 400;
      background: var(--text-primary);
      color: #fff;
      padding: 13px 20px;
      border-radius: 10px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 9px;
      box-shadow: 0 8px 24px rgba(28, 26, 23, 0.2);
      transform: translateY(16px);
      opacity: 0;
      transition: all 0.25s ease;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      nav {
        padding: 0 20px;
      }

      main {
        padding: 32px 20px 60px;
      }

      .gifts-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }
    }

    @media (max-width: 480px) {
      .gifts-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <nav>
    <a class="logo" href="user-home.html">
      <img src="icon\surprise (1).png" style="width:32px;height:32px;object-fit:contain;" alt="Giver">
      Giver
    </a>
    <ul class="nav-links">
      <li><a href="user-home.html">
          <img src="icon\home (1).png" style="width:15px;height:15px;object-fit:contain;" alt="icon">
          Home
        </a></li>
      <li><a href="user-recipients.html">
          <img src="icon\home (1).png" style="width:15px;height:15px;object-fit:contain;" alt="icon">
          Recipients
        </a></li>
      <li><a href="user-favorites.html">
          <img src="icon\group (1).png" style="width:15px;height:15px;object-fit:contain;" alt="icon">
          Favorites
        </a></li>
      <li><a href="#" onclick="logout()">
          <img src="icon\star (1).png" style="width:15px;height:15px;object-fit:contain;" alt="icon">
          Logout
        </a></li>
    </ul>
  </nav>

  <main>
    <!-- HEADER -->
    <div class="page-header">
      <a class="back-link" href="user-recipients.html">
        <img src="icon\group (1).png" style="width:14px;height:14px;object-fit:contain;" alt="icon">
        Back to Recipients
      </a>
      <h1>Recipient Management</h1>
      <p id="pageSubtitle">Personalized gifts</p>
      <div class="recipient-tags" id="recipientTags"></div>
    </div>

    <!-- INTERESTS CARD -->
    <div class="interests-card">
      <div class="interests-label">Interests</div>
      <div class="interests-tags" id="interestsTags">
        <span class="interest-chip" style="color:var(--text-secondary);font-style:italic;">No interests specified</span>
      </div>
    </div>

    <!-- GIFTS SECTION -->
    <div class="section-title" id="sectionTitle">Recommended Gifts</div>
    <div class="gifts-grid" id="giftsGrid"></div>
  </main>

  <!-- DETAIL MODAL -->
  <div class="detail-overlay" id="detailModal" onclick="handleOverlayClick(event)">
    <div class="detail-modal">
      <div class="detail-head">
        <div>
          <h2 id="detailName"></h2>
          <p id="detailDesc"></p>
        </div>
        <button class="detail-close" onclick="closeDetailModal()" title="Close">&times;</button>
      </div>
      <div class="detail-options">
        <div class="detail-opts-label">Available Options</div>
        <div id="detailOptions"></div>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast">
    <img src="icon\surprise (1).png" style="width:16px;height:16px;object-fit:contain;" alt="icon">
    <span id="toastMsg"></span>
  </div>

  <script>
    /* ─── AUTH ─── */
    const user = JSON.parse(sessionStorage.getItem('giver_user') || '{}');
    if (!user || !user.id) window.location.href = 'login_register_page.html';
    if (user.role === 'admin') window.location.href = 'giver-dashboard.html';

    const userId = user.id;
    let ALL_GIFTS    = [];
    let VOCABULARY   = [];
    let RULES        = [];
    let TAG_ID_MAP   = {};
    let favorites    = [];
    let allCategories = [];
    const slideshowTimers = new Map();

    /* ─── LOAD ALL DATA FROM API ─── */
    async function loadData() {
      try {
        const [giftsRes, vocabRes, rulesRes, favsRes, catsRes] = await Promise.all([
          fetch('/api/gifts'),
          fetch('/api/vocabulary'),
          fetch('/api/rules'),
          fetch(`/api/favorites?userId=${userId}`),
          fetch('/api/categories')
        ]);
        ALL_GIFTS     = giftsRes.ok  ? await giftsRes.json()  : [];
        VOCABULARY    = vocabRes.ok  ? await vocabRes.json()  : [];
        RULES         = rulesRes.ok  ? await rulesRes.json()  : [];
        favorites     = favsRes.ok   ? await favsRes.json()   : [];
        allCategories = catsRes.ok   ? await catsRes.json()   : [];
        TAG_ID_MAP = {};
        VOCABULARY.forEach(v => { if (v.tag_id) TAG_ID_MAP[String(v.tag_id)] = v; });
      } catch (e) { console.error('Data load error', e); }
    }

    function getCategoryName(id) {
      const cat = allCategories.find(c => c.category_id === id);
      return cat ? cat.category_name : (id || '');
    }

    /* ─── FAVORITES ─── */
    function isFav(giftId) { return favorites.includes(String(giftId)); }

    async function toggleFav(giftId, btn) {
      try {
        const res = await fetch('/api/favorites/toggle', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, giftId: String(giftId) })
        });
        if (!res.ok) return;
        const data = await res.json();
        favorites = data.giftIds;
        const active = favorites.includes(String(giftId));
        btn.classList.toggle('active', active);
        const svg = btn.querySelector('svg');
        svg.setAttribute('fill', active ? '#e74c3c' : 'none');
        svg.setAttribute('stroke', active ? '#e74c3c' : '#7a7268');
        showToast(active ? 'Added to favorites! ♥' : 'Removed from favorites.');
      } catch (e) { showToast('Error updating favorites.'); }
    }

    /* ─── RECOMMENDATION ENGINE ─── */
    function expandInterests(interests) {
      const expanded = new Set();
      interests.forEach(raw => {
        const lower = raw.toLowerCase().trim();
        expanded.add(lower);
        VOCABULARY.forEach(v => {
          const synonyms = v.synonyms || [];
          // Bug Fix: ใช้ toLowerCase() เพื่อ case-insensitive matching
          const termLower = (v.term || '').toLowerCase();
          const synLower  = synonyms.map(s => s.toLowerCase());
          if (termLower === lower || synLower.includes(lower)) {
            // Bug Fix: เก็บ lowercase เสมอเพื่อให้ includes() ทำงานถูกต้อง
            expanded.add(termLower);
            synLower.forEach(s => expanded.add(s));
          }
        });
      });
      return [...expanded];
    }

    function getMatchedCategories(expandedInterests) {
      const categories = new Set();

      // 1. จาก Rules: condition matches → target category
      RULES.forEach(rule => {
        const conditions = rule.condition || [];
        const matched = conditions.some(c => expandedInterests.includes(c.toLowerCase()));
        if (matched) {
          // รองรับทั้ง target_category_ids (array) และ target_category_id (string)
          const cats = rule.target_category_ids
            || (rule.target_category_id ? [rule.target_category_id] : [])
            || rule.categories
            || [];
          cats.forEach(cat => categories.add(String(cat)));
        }
      });

      // 2. จาก Vocabulary โดยตรง: term/synonym match → category_id
      //    (วิธีนี้ทำงานได้แม้ไม่มี Rule ที่ตรง)
      VOCABULARY.forEach(v => {
        const terms = [v.term, ...(v.synonyms || [])].map(s => s.toLowerCase());
        if (terms.some(t => expandedInterests.includes(t))) {
          if (v.category_id) categories.add(String(v.category_id));
        }
      });

      return [...categories];
    }

    function scoreGift(gift, expandedInterests, matchedCategories) {
      const tags = gift.tags || [];
      let tagScore = 0;

      tags.forEach(tagId => {
        const vocab = TAG_ID_MAP[String(tagId)];
        if (vocab) {
          // tag_id → vocabulary term + synonyms → เทียบกับ expanded interests
          const vocabTerms = [vocab.term, ...(vocab.synonyms || [])].map(s => s.toLowerCase());
          if (vocabTerms.some(t => expandedInterests.includes(t))) tagScore += 1;
        } else {
          // fallback: ถ้า tag เป็น text โดยตรง
          if (expandedInterests.includes(String(tagId).toLowerCase())) tagScore += 1;
        }
      });

      // bonus +5 ถ้า gift อยู่ใน matched category
      const inCategory = matchedCategories.includes(String(gift.category_id || gift.category || ''));
      return tagScore + (inCategory ? 5 : 0);
    }

    function getGiftCategory(gift) {
      return gift.category_id || gift.category || '';
    }

    function getFirstImg(g) {
      if (g.options && g.options.length > 0) return g.options[0].image_url || 'surprise(1).png';
      return g.image || 'surprise(1).png';
    }
    function getFirstPrice(g) {
      if (g.options && g.options.length > 0) return g.options[0].price || 0;
      return g.price || 0;
    }

    // Bug Fix: rating อยู่ใน options[] ไม่ใช่ top-level
    function getGiftRating(g) {
      if (g.options && g.options.length > 0) return parseFloat(g.options[0].rating) || 0;
      return parseFloat(g.rating) || 0;
    }

    function getRecommendedGifts(recipient) {
      if (!recipient.interests || recipient.interests.length === 0) {
        // ไม่มี interests → แสดงทุก gift เรียงตาม rating
        return [...ALL_GIFTS].sort((a, b) => getGiftRating(b) - getGiftRating(a));
      }
      const expanded    = expandInterests(recipient.interests);
      const categories  = getMatchedCategories(expanded);
      const scored = ALL_GIFTS.map(g => ({
        ...g,
        _score: scoreGift(g, expanded, categories)
      }));
      return scored
        .filter(g => g._score > 0)
        .sort((a, b) => b._score - a._score || (b.rating || 0) - (a.rating || 0));
    }

    /* ─── GET ALL IMAGES ─── */
    function getAllImgs(g) {
      if (!g.options || g.options.length === 0) return [g.image || 'surprise(1).png'];
      const imgs = g.options.map(o => o.pic_link || o.image_url).filter(Boolean);
      return imgs.length > 0 ? imgs : ['surprise(1).png'];
    }

    /* ─── DETAIL MODAL ─── */
    function openDetailModal(id) {
      const g = ALL_GIFTS.find(x => String(x._id || x.id) === String(id));
      if (!g) return;
      document.getElementById('detailName').textContent = g.gift_name || g.name || '';
      document.getElementById('detailDesc').textContent = g.description || '';
      const opts = g.options || [];
      document.getElementById('detailOptions').innerHTML = opts.length === 0
        ? '<p style="color:var(--text-secondary);font-size:14px;">No options available for this gift.</p>'
        : opts.map(o => {
            const img   = o.pic_link || o.image_url || 'surprise(1).png';
            const shop  = o.shop_name || 'Shop';
            const price = o.price ? '฿' + Number(o.price).toLocaleString() : '—';
            const ratingHtml = o.rating ? `<div class="detail-opt-rating">★ ${o.rating}</div>` : '';
            const linkHtml = o.shop_link
              ? `<a class="detail-opt-link" href="${o.shop_link}" target="_blank" rel="noopener">Visit Shop ↗</a>`
              : `<span class="detail-no-link">No link available</span>`;
            return `<div class="detail-opt-card">
              <img class="detail-opt-img" src="${img}" alt="${escHtml(shop)}"
                   onerror="this.src='surprise(1).png';this.style.objectFit='contain';this.style.padding='12px';">
              <div class="detail-opt-info">
                <div>
                  <div class="detail-opt-shop">${escHtml(shop)}</div>
                  <div class="detail-opt-price">${price}</div>
                  ${ratingHtml}
                </div>
                ${linkHtml}
              </div>
            </div>`;
          }).join('');
      document.getElementById('detailModal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeDetailModal() {
      document.getElementById('detailModal').classList.remove('open');
      document.body.style.overflow = '';
    }

    function handleOverlayClick(e) {
      if (e.target === document.getElementById('detailModal')) closeDetailModal();
    }

    /* ─── RENDER PAGE ─── */
    function renderPage(recipient) {
      document.getElementById('pageSubtitle').textContent = `Personalized gifts for ${recipient.name}`;
      document.title = `Giver — Gifts for ${recipient.name}`;

      const tagsEl = document.getElementById('recipientTags');
      tagsEl.innerHTML = [
        `<span class="rec-tag">Age: ${recipient.age}</span>`,
        `<span class="rec-tag">${escHtml(recipient.relation)}</span>`,
        recipient.gender ? `<span class="rec-tag">${escHtml(recipient.gender)}</span>` : ''
      ].join('');

      const interestsEl = document.getElementById('interestsTags');
      if (recipient.interests && recipient.interests.length > 0) {
        interestsEl.innerHTML = recipient.interests
          .map(i => `<span class="interest-chip">${escHtml(i.trim())}</span>`)
          .join('');
      } else {
        interestsEl.innerHTML = `<span class="interest-chip" style="color:var(--text-secondary);font-style:italic;">No interests specified</span>`;
      }

      const recommended = getRecommendedGifts(recipient);
      const grid = document.getElementById('giftsGrid');
      const titleEl = document.getElementById('sectionTitle');

      // Clear old slideshows
      slideshowTimers.forEach(t => clearInterval(t));
      slideshowTimers.clear();

      titleEl.textContent = recommended.length > 0
        ? `Recommended Gifts (${recommended.length})` : 'No Recommendations';

      if (recommended.length === 0) {
        grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1;">
          <img src="icon\surprise (1).png" style="width:48px;height:48px;object-fit:contain;" alt="icon">
          <h3>No matches found</h3>
          <p>Try updating the recipient's interests to get better recommendations.</p>
        </div>`;
        return;
      }

      grid.innerHTML = recommended.map(g => {
        const id   = g._id || g.id;
        const name = g.gift_name || g.name || '';
        const cat  = g.category_id || g.category || '';
        const imgs = getAllImgs(g);
        const fav  = isFav(id);
        const dotsHtml = imgs.length > 1
          ? `<div class="img-dots">${imgs.map((_,i) => `<span class="img-dot ${i===0?'active':''}"></span>`).join('')}</div>`
          : '';
        return `
        <div class="gift-card" id="card-${id}">
          <div class="gift-img-wrap">
            <img class="gift-slide-img" src="${imgs[0]}" alt="${escHtml(name)}"
                 onerror="this.src='surprise(1).png';this.style.objectFit='contain';this.style.padding='24px';">
            ${dotsHtml}
            <span class="gift-category-badge">${escHtml(getCategoryName(cat))}</span>
            <button class="fav-btn ${fav ? 'active' : ''}" id="fav-${id}"
                    onclick="toggleFav('${id}', this)"
                    title="${fav ? 'Remove from favorites' : 'Add to favorites'}">
              <img src="icon\star (1).png" style="width:16px;height:16px;object-fit:contain;" alt="icon">
            </button>
          </div>
          <div class="gift-info">
            <div class="gift-name">${escHtml(name)}</div>
            <button class="view-btn" onclick="openDetailModal('${id}')">View Details</button>
          </div>
        </div>`;
      }).join('');

      // Start slideshows
      recommended.forEach(g => {
        const id   = g._id || g.id;
        const imgs = getAllImgs(g);
        if (imgs.length <= 1) return;
        const card = document.getElementById(`card-${id}`);
        if (!card) return;
        const imgEl = card.querySelector('.gift-slide-img');
        const dots  = card.querySelectorAll('.img-dot');
        let cur = 0;
        const t = setInterval(() => {
          cur = (cur + 1) % imgs.length;
          imgEl.style.opacity = '0';
          setTimeout(() => { imgEl.src = imgs[cur]; imgEl.style.opacity = '1'; }, 180);
          dots.forEach((d, i) => d.classList.toggle('active', i === cur));
        }, 2500);
        slideshowTimers.set(String(id), t);
      });
    }

    /* ─── TOAST ─── */
    let toastTimer;
    function showToast(msg) {
      const toast = document.getElementById('toast');
      document.getElementById('toastMsg').textContent = msg;
      toast.className = 'toast show';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function escHtml(str) {
      return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function logout() { sessionStorage.removeItem('giver_user'); window.location.href = 'login_register_page.html'; }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetailModal(); });

    /* ─── INIT ─── */
    async function init() {
      await loadData();
      // Try sessionStorage first, then fetch by URL id
      const recipientData = JSON.parse(sessionStorage.getItem('giver_selected_recipient') || 'null');
      if (recipientData) {
        renderPage(recipientData);
        return;
      }
      const urlId = new URLSearchParams(window.location.search).get('id');
      if (urlId) {
        try {
          const res = await fetch(`/api/recipients?userId=${userId}`);
          const recs = res.ok ? await res.json() : [];
          const found = recs.find(r => r._id === urlId);
          if (found) { renderPage(found); return; }
        } catch (e) { }
      }
      window.location.href = 'user-recipients.html';
    }

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giver – Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
         :root {
            --col-offwhite: #FAF8F5;
            --col-cream: #FBF0F2;
            --col-beige1: #C9A96E;
            --col-beige3: #F3EFEB;
            --col-brown2: #6B5D52;
            --col-dark1: #3D322A;
            --col-salmon: #C65D51;
            --bg: var(--col-offwhite);
            --text: var(--col-brown2);
            --text-dark: var(--col-dark1);
            --accent: var(--col-salmon);
            --gold: var(--col-beige1);
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* NAV */
        
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 52px;
            background: var(--bg);
            border-bottom: 1px solid rgba(69, 54, 49, .09);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .nav-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.45rem;
            font-weight: 600;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        
        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .nav-links a {
            text-decoration: none;
            color: var(--text);
            font-size: .85rem;
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color .2s;
        }
        
        .nav-links a:hover {
            color: var(--accent);
        }
        
        .btn-register {
            background: var(--text-dark) !important;
            color: #fff !important;
            padding: 8px 20px;
            border-radius: 3px;
            font-weight: 500 !important;
        }
        /* MAIN */
        
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            background: var(--col-cream);
        }
        
        .auth-card {
            background: #fff;
            border: 1px solid rgba(69, 54, 49, .1);
            border-radius: 4px;
            width: 100%;
            max-width: 400px;
            padding: 48px 44px 44px;
            box-shadow: 0 4px 32px rgba(69, 54, 49, .07);
            animation: fadeUp .55s ease both;
        }
        
        .card-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .brand-icon {
            width: 52px;
            height: 52px;
            margin: 0 auto 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .brand-icon img {
            width: 52px;
            height: 52px;
            object-fit: contain;
        }
        
        .card-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 4px;
        }
        
        .card-header .subtitle {
            font-size: .72rem;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 500;
        }
        
        .card-header .tagline {
            font-size: .8rem;
            color: var(--text);
            margin-top: 6px;
            font-weight: 300;
        }
        /* TABS */
        
        .tabs {
            display: flex;
            border-bottom: 1.5px solid rgba(69, 54, 49, .12);
            margin-bottom: 28px;
        }
        
        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 10px 0;
            font-family: 'Inter', sans-serif;
            font-size: .82rem;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            position: relative;
            letter-spacing: .04em;
            transition: color .2s;
        }
        
        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -1.5px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--text-dark);
            transform: scaleX(0);
            transition: transform .25s ease;
        }
        
        .tab-btn.active {
            color: var(--text-dark);
        }
        
        .tab-btn.active::after {
            transform: scaleX(1);
        }
        /* FORM */
        
        .form-desc {
            font-size: .8rem;
            color: var(--text);
            margin-bottom: 20px;
            font-weight: 300;
            line-height: 1.6;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            font-size: .74rem;
            font-weight: 500;
            color: var(--text-dark);
            margin-bottom: 7px;
            letter-spacing: .03em;
        }
        
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid rgba(69, 54, 49, .18);
            border-radius: 2px;
            font-family: 'Inter', sans-serif;
            font-size: .84rem;
            color: var(--text-dark);
            background: var(--col-offwhite);
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        
        .form-group input::placeholder {
            color: rgba(107, 93, 82, .38);
            font-weight: 300;
        }
        
        .form-group input:focus {
            border-color: var(--col-brown2);
            box-shadow: 0 0 0 3px rgba(107, 93, 82, .08);
            background: #fff;
        }
        
        .form-helper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: -6px;
            margin-bottom: 16px;
        }
        
        .form-helper label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: .75rem;
            color: var(--text);
            cursor: pointer;
            font-weight: 300;
        }
        
        .form-helper label input[type="checkbox"] {
            width: 13px;
            height: 13px;
            accent-color: var(--text-dark);
        }
        
        .forgot-link {
            font-size: .75rem;
            color: var(--col-brown2);
            text-decoration: underline;
            text-underline-offset: 2px;
            cursor: pointer;
            font-weight: 300;
            background: none;
            border: none;
            font-family: 'Inter', sans-serif;
        }
        
        .forgot-link:hover {
            color: var(--accent);
        }
        
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--text-dark);
            color: #fff;
            border: none;
            border-radius: 2px;
            font-family: 'Inter', sans-serif;
            font-size: .84rem;
            font-weight: 500;
            letter-spacing: .06em;
            cursor: pointer;
            transition: background .2s, transform .15s;
            margin-top: 6px;
        }
        
        .btn-submit:hover {
            background: var(--col-brown2);
            transform: translateY(-1px);
        }
        
        .switch-hint {
            text-align: center;
            margin-top: 20px;
            font-size: .78rem;
            color: var(--text);
            font-weight: 300;
        }
        
        .switch-hint a {
            color: var(--text-dark);
            font-weight: 500;
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        
        .switch-hint a:hover {
            color: var(--accent);
        }
        /* FOOTER */
        
        footer {
            background: var(--col-cream);
            border-top: 1px solid rgba(69, 54, 49, .1);
            padding: 20px 52px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: .73rem;
            color: var(--col-brown2);
            font-family: 'Inter', sans-serif;
        }
        
        .footer-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 520px) {
            nav {
                padding: 16px 20px;
            }
            .auth-card {
                padding: 32px 24px;
            }
            footer {
                padding: 16px 20px;
                flex-direction: column;
                gap: 8px;
            }
        }
    </style>
</head>

<body>

    <nav>
        <a href="main_page.html" class="nav-logo">
            <img src="surprise(1).png" style="width:22px;height:22px;object-fit:contain;"> Giver
        </a>
        <div class="nav-links">
            <a href="login.html"><img src="surprise(1).png" style="width:13px;height:13px;object-fit:contain;"> Login</a>
            <a href="register.html" class="btn-register"><img src="surprise(1).png" style="width:13px;height:13px;object-fit:contain;display:inline;vertical-align:middle;margin-right:4px;"> Register</a>
        </div>
    </nav>

    <main>
        <div class="auth-card">
            <div class="card-header">
                <div class="brand-icon">
                    <img src="surprise(1).png" />
                </div>
                <h1>Giver</h1>
                <div class="subtitle">Gift Recommendation System</div>
                <div class="tagline">Find the perfect gift for everyone you care about.</div>
            </div>

            <div class="tabs">
                <button class="tab-btn active">Login</button>
                <button class="tab-btn" onclick="location.href='register.html'">Register</button>
            </div>

            <p class="form-desc">Welcome back! Enter your credentials to access your account.</p>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="student@email.com" />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" />
            </div>

            <div class="form-helper">
                <label><input type="checkbox" /> Remember me</label>
                <button class="forgot-link">Forgot password?</button>
            </div>

            <button class="btn-submit" onclick="handleLogin()">Login</button>

            <div class="switch-hint">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-logo">
            <img src="surprise(1).png" style="width:18px;height:18px;object-fit:contain;"> Giver
        </div>
        <span>© 2026 Giver — Gift Recommendation System</span>
    </footer>

    <script>
        function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            if (!email || !pass) {
                alert('Please fill in all fields.');
                return;
            }
            // TODO: connect to backend
            alert('Login successful! (demo)');
        }
    </script>
</body>

</html>
